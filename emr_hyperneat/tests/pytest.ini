[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    multi_gpu: marks tests requiring multiple GPUs
    cuda: marks tests requiring CUDA
    golden_cpu: exact golden-value regression recorded on CPU with jax==0.6.1 (deselect when changing JAX versions, then re-record)
    paper: re-runs a published paper's simple experiment and asserts its headline finding (select with '-m paper')
    network: needs internet (live Zenodo data-release check; auto-skips when offline)

# Output options
addopts =
    -v
    --tb=short
    -ra

# Strict markers to catch typos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning

# Minimum pytest version
minversion = 7.0

# Console output
console_output_style = progress

# Logging
log_cli = false
log_cli_level = WARNING
